<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 240" width="600" height="240"><rect x="30" y="50" width="170" height="110" fill="#DBEAFE" stroke="#1A3C6D" stroke-width="2.5"/><text x="115" y="90" text-anchor="middle" font-size="14" fill="#1A3C6D" font-weight="700">小學思維</text><text x="115" y="115" text-anchor="middle" font-size="12" fill="#1A3C6D" font-weight="700">「找出答案」</text><text x="115" y="138" text-anchor="middle" font-size="11" fill="#6B7280" font-weight="700">數字→答案</text><rect x="400" y="50" width="170" height="110" fill="#DCFCE7" stroke="#1A3C6D" stroke-width="2.5"/><text x="485" y="90" text-anchor="middle" font-size="14" fill="#1A3C6D" font-weight="700">中學思維</text><text x="485" y="115" text-anchor="middle" font-size="12" fill="#1A3C6D" font-weight="700">「表達關係」</text><text x="485" y="138" text-anchor="middle" font-size="11" fill="#6B7280" font-weight="700">變數→關係</text><rect x="200" y="75" width="200" height="60" fill="#FEF3C7" stroke="#C9A84C" stroke-width="2.5" stroke-dasharray="6,3"/><text x="300" y="100" text-anchor="middle" font-size="14" fill="#C9A84C" font-weight="700">數學思維轉換</text><text x="300" y="115" text-anchor="middle" font-size="11" fill="#1A3C6D" font-weight="700">算術 → 代數</text><line x1="200" y1="105" x2="400" y2="105" stroke="#C9A84C" stroke-width="2.5"/><polygon points="400,105 390,97 390,113" fill="#C9A84C"/><text x="300" y="200" text-anchor="middle" font-size="13" fill="#1A3C6D" font-weight="700">「不教數學，教避開陷阱。」</text></svg>